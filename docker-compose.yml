services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      BACKEND_PORT: 3001
      RUN_DB_INIT_ON_STARTUP: "false"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:9103}
    command: sh -c "npm --prefix backend run start"
    ports:
      - "${BACKEND_PORT:-5057}:3001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-9103}:8080"
